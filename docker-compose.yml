services:
  fire-poc:
    build: .
    image: fire-poc:latest
    container_name: fire-poc
    restart: unless-stopped
    environment:
      # persist ROI + thresholds + RTSP across restarts (data is a named volume)
      VE_SETTINGS_FILE: /app/data/settings.json
    ports:
      - "8080:8080"
    volumes:
      - fire_data:/app/data          # events DB + snapshots
      - fire_evidence:/app/evidence  # evidence .mp4 clips
      - ./web:/app/web:ro            # static SPA (live-editable, no rebuild needed)
      - ./videos:/app/videos:ro      # drop test .mp4 files here; use /app/videos/<name>.mp4

volumes:
  fire_data:
  fire_evidence:
