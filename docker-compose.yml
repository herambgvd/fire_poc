services:
  fire-poc:
    build: .
    image: fire-poc:latest
    container_name: fire-poc
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - fire_data:/app/data          # events DB + snapshots
      - fire_evidence:/app/evidence  # evidence .mp4 clips
    # For a LOCAL demo video, uncomment and use /app/demo.mp4 as the "RTSP URL":
    # volumes:
    #   - ./demo.mp4:/app/demo.mp4:ro

volumes:
  fire_data:
  fire_evidence:
